name: Oracle Cloud - Instance Creation Loop

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: curl, openssl

      - name: Install Dependencies
        run: composer install

      - name: Build Environment and Key Files
        run: |
          cat << 'EOF' > .env
          OCI_REGION="${{ secrets.OCI_REGION }}"
          OCI_USER_ID="${{ secrets.OCI_USER_ID }}"
          OCI_TENANCY_ID="${{ secrets.OCI_TENANCY_ID }}"
          OCI_KEY_FINGERPRINT="${{ secrets.OCI_KEY_FINGERPRINT }}"
          OCI_AVAILABILITY_DOMAIN="${{ secrets.OCI_AVAILABILITY_DOMAIN }}"
          OCI_SUBNET_ID="${{ secrets.OCI_SUBNET_ID }}"
          OCI_IMAGE_ID="${{ secrets.OCI_IMAGE_ID }}"
          OCI_OCPUS="${{ secrets.OCI_OCPUS }}"
          OCI_MEMORY_IN_GBS="${{ secrets.OCI_MEMORY_IN_GBS }}"
          OCI_BOOT_VOLUME_SIZE_IN_GBS="${{ secrets.OCI_BOOT_VOLUME_SIZE_IN_GBS }}"
          OCI_PRIVATE_KEY_FILENAME="private_key.pem"
          OCI_SHAPE="VM.Standard.A1.Flex"
          OCI_SSH_PUBLIC_KEY="${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          EOF
          
          cat << 'EOF' > private_key.pem
          ${{ secrets.OCI_KEY_PRIVATE }}
          EOF
          
          chmod 600 private_key.pem

      - name: Execute Instance Creation Script
        run: php index.php
